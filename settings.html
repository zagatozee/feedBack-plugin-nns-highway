<div role="group" aria-labelledby="nns-settings-heading">
    <h3 id="nns-settings-heading" class="text-sm font-medium text-gray-400 mb-2">Nashville Numbers Highway</h3>
    <label class="flex items-start gap-2 mb-1 text-xs text-gray-300">
        <input type="checkbox" id="nns-auto-generate" class="mt-0.5">
        <span>
            Automatically save computed Nashville-number data next to the song file
            <span class="block text-gray-500 mt-0.5">
                Only saves a result the plugin is actually confident in — never an
                uncertain guess. The file is a plain sibling JSON next to the song's
                own chart data (or a new entry inside the .sloppak archive); the
                original chart file is never modified. Off by default since this
                writes into your song library.
            </span>
        </span>
    </label>
    <label class="flex items-start gap-2 mt-3 mb-1 text-xs text-gray-300">
        <span class="flex-1">
            Chord block color scheme
            <select id="nns-color-scheme" class="w-full mt-1 bg-dark-700 border border-gray-800 rounded-lg px-2 py-1.5 text-xs text-gray-300 outline-none">
                <option value="circle_of_fifths">Circle of fifths (default)</option>
            </select>
            <span class="block text-gray-500 mt-0.5">
                How each chord block is colored. Circle of fifths orders hues by
                harmonic distance from the key's tonic (so 1, 4 and 5 land close
                together), not by raw scale-degree number. Minor/diminished
                chords use a darker, desaturated version of the same hue;
                extensions (7, sus, add9, b/#) share the base chord's color and
                are shown via the on-block number label instead.
            </span>
        </span>
    </label>
    <script>
        (function () {
            var AUTO_GEN_KEY = 'nns_highway.autoGenerate';
            var box = document.getElementById('nns-auto-generate');
            if (box) {
                try {
                    box.checked = window.localStorage.getItem(AUTO_GEN_KEY) === 'true';
                } catch (e) { /* localStorage unavailable — leave unchecked */ }
                box.addEventListener('change', function () {
                    try {
                        window.localStorage.setItem(AUTO_GEN_KEY, box.checked ? 'true' : 'false');
                    } catch (e) { /* ignore — best-effort persistence, same as the plugin's own save calls */ }
                });
            }

            var COLOR_SCHEME_KEY = 'nns_highway.colorScheme';
            var select = document.getElementById('nns-color-scheme');
            if (select) {
                try {
                    var saved = window.localStorage.getItem(COLOR_SCHEME_KEY);
                    if (saved) select.value = saved;
                } catch (e) { /* localStorage unavailable — leave at default */ }
                select.addEventListener('change', function () {
                    try {
                        window.localStorage.setItem(COLOR_SCHEME_KEY, select.value);
                    } catch (e) { /* ignore — best-effort persistence */ }
                });
            }
        })();
    </script>
</div>
